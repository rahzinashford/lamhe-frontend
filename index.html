<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lamhe — Farewell Party</title>
  <link rel="icon" type="image/png" href="static/images/favicon.png" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    /* ── Page wrapper — fades in on load ── */
    #app {
      position: fixed;
      inset: 0;
      overflow: hidden;
      opacity: 0;
      transition: opacity 1.2s ease;
    }

    #app.visible {
      opacity: 1;
    }

    /* ── Background poster ── */
    picture {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    picture img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
    }

    /* ── Dark gradient overlay ── */
    .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom,
          rgba(0, 0, 0, 0.10) 0%,
          rgba(0, 0, 0, 0.20) 50%,
          rgba(0, 0, 0, 0.72) 100%);
    }

    /* ── Button wrapper ── */
    .btn-wrap {
      position: absolute;
      bottom: 10%;
      left: 0;
      right: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Register button ── */
    @keyframes shimmer {
      0% {
        transform: translateX(-110%) skewX(-15deg);
      }

      100% {
        transform: translateX(220%) skewX(-15deg);
      }
    }

    .register-btn {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 17px 52px;
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-decoration: none;
      color: #0d0a00;
      background: linear-gradient(105deg, #f5c842 0%, #d4960a 50%, #f0bc30 100%);
      background-size: 200% 100%;
      border: none;
      border-radius: 100px;
      cursor: pointer;
      overflow: hidden;
      transition:
        transform 0.28s cubic-bezier(0.34, 1.56, 0.64, 1),
        box-shadow 0.28s ease,
        filter 0.28s ease;
      box-shadow:
        0 2px 20px rgba(212, 168, 30, 0.35),
        0 1px 0 rgba(255, 255, 255, 0.25) inset;
    }

    .register-btn::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 45%;
      height: 100%;
      background: linear-gradient(90deg,
          transparent 0%,
          rgba(255, 255, 255, 0.55) 50%,
          transparent 100%);
      transform: translateX(-110%) skewX(-15deg);
      pointer-events: none;
    }

    .register-btn:hover::before {
      animation: shimmer 0.65s ease forwards;
    }

    .register-btn:hover {
      transform: translateY(-3px) scale(1.04);
      box-shadow:
        0 8px 32px rgba(212, 168, 30, 0.6),
        0 2px 8px rgba(212, 168, 30, 0.4),
        0 1px 0 rgba(255, 255, 255, 0.3) inset;
      filter: brightness(1.08);
    }

    .register-btn:active {
      transform: translateY(0) scale(0.98);
      box-shadow:
        0 2px 12px rgba(212, 168, 30, 0.4),
        0 1px 0 rgba(255, 255, 255, 0.2) inset;
      filter: brightness(0.96);
    }

    .btn-icon {
      display: inline-flex;
      align-items: center;
      transition: transform 0.28s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .register-btn:hover .btn-icon {
      transform: translateX(4px);
    }
  </style>
</head>

<body>

  <div id="app">

    <picture>
      <!-- Landscape / desktop → 16:9 poster -->
      <source media="(orientation: landscape)" srcset="static/images/poster-desktop.png" />
      <!-- Portrait / mobile → 9:16 poster -->
      <source media="(orientation: portrait)" srcset="static/images/poster-mobile.png" />
      <img src="static/images/poster-desktop.png" alt="Lamhe Farewell Party" />
    </picture>

    <div class="overlay"></div>

    <div class="btn-wrap">
      <a href="register.html" class="register-btn">
        Register
        <span class="btn-icon">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M3 7.5h9M8.5 4l3.5 3.5L8.5 11" stroke="#0d0a00" stroke-width="1.6" stroke-linecap="round"
              stroke-linejoin="round" />
          </svg>
        </span>
      </a>
    </div>

  </div>

  <script>
    window.addEventListener('load', function () {
      setTimeout(function () {
        document.getElementById('app').classList.add('visible');
      }, 50);
    });
  </script>
</body>

</html>
